services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    command: python3 -m http.server 5000
    volumes:
      - ./backend:/app

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
